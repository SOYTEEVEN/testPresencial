<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contacto - ITINNews</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }
        .cabecera{
            background-color: rgb(40, 50, 82);
        }
        .tarjeta{
            background-color: rgb(255, 255, 255);
            width: 80%; /* Un poco más angosta para el formulario */
            height: auto;
            margin-left: 10%;
            margin-right: 10%;
            margin-top: 3%;
            margin-bottom: 3%;
            border-radius: 5px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1); /* Ligera sombra para que resalte */
        }
        .barranav{
            background-color: rgb(40, 50, 82);
            width: 100%;
        }
        .navboton{
            background-color: rgb(40, 50, 82);
            border: 0px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .navboton:hover{
            background-color: rgb(255, 255, 255);
            color: rgb(40, 50, 82);
        }
        
        /* Estilos nuevos para el formulario de contacto */
        .input-contacto {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid rgb(120, 142, 214);
            border-radius: 5px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        .btn-enviar {
            background-color: rgb(120, 142, 214);
            border: 1px solid rgb(120, 142, 214);
            border-radius: 5px;
            color: white;
            font-size: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }
        .btn-enviar:hover {
            background-color: rgb(255, 255, 255);
            color: rgb(120, 142, 214);
        }
    </style>
</head>
